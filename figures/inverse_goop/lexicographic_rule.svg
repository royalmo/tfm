<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330" version="1.1">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 6 L 0 12" style="fill:none;stroke:#000000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round" />
    </marker>
  </defs>

  <rect x="18" y="24" width="256" height="282" rx="18" ry="18" style="fill:#fafafa;stroke:#000000;stroke-width:1.6" />
  <text x="146" y="56" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{preference order}</text>
  <text x="146" y="80" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{highest priority first}</text>

  <rect x="46" y="108" width="200" height="40" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <rect x="46" y="160" width="200" height="40" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <rect x="46" y="212" width="200" height="40" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <text x="146" y="134" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{$\ell^i_{\pi_1}$}</text>
  <text x="146" y="186" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{$\ell^i_{\pi_2}$}</text>
  <text x="146" y="238" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{$\ell^i_{\pi_3}$}</text>
  <text x="146" y="281" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{the order changes which}</text>
  <text x="146" y="302" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{objective is compared first}</text>

  <rect x="310" y="24" width="652" height="282" rx="18" ry="18" style="fill:#fafafa;stroke:#000000;stroke-width:1.6" />
  <text x="636" y="56" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{lexicographic cascade}</text>

  <line x1="392" y1="92" x2="392" y2="244" style="stroke:#000000;stroke-width:2.2;stroke-linecap:round" />
  <circle cx="392" cy="108" r="7.2" style="fill:#f4a259;stroke:#d97706;stroke-width:1.1" />
  <circle cx="392" cy="160" r="7.2" style="fill:#329a55;stroke:#2f7d32;stroke-width:1.1" />
  <circle cx="392" cy="212" r="7.2" style="fill:#2f78c4;stroke:#1d4ed8;stroke-width:1.1" />

  <rect x="438" y="90" width="434" height="44" rx="12" ry="12" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <rect x="438" y="142" width="434" height="44" rx="12" ry="12" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <rect x="438" y="194" width="434" height="44" rx="12" ry="12" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />

  <text x="655" y="117" text-anchor="middle" style="font-family:Sans;font-size:17px">\footnotesize{solve level 1 and keep only its minimizers}</text>
  <text x="655" y="169" text-anchor="middle" style="font-family:Sans;font-size:17px">\footnotesize{if the previous level ties, compare level 2}</text>
  <text x="655" y="221" text-anchor="middle" style="font-family:Sans;font-size:17px">\footnotesize{if a tie remains, continue to the next level}</text>

  <path d="M 392 108 L 438 112" style="fill:none;stroke:#000000;stroke-width:2;stroke-linecap:round;marker-end:url(#arrow)" />
  <path d="M 392 160 L 438 164" style="fill:none;stroke:#000000;stroke-width:2;stroke-linecap:round;marker-end:url(#arrow)" />
  <path d="M 392 212 L 438 216" style="fill:none;stroke:#000000;stroke-width:2;stroke-linecap:round;marker-end:url(#arrow)" />

  <rect x="438" y="252" width="434" height="32" rx="10" ry="10" style="fill:#e8f5e9;stroke:#2f7d32;stroke-width:1.1" />
  <text x="655" y="274" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{the first non-tied objective level determines the local decision}</text>
</svg>
