<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" version="1.1">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 6 L 0 12" style="fill:none;stroke:#000000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round" />
    </marker>
  </defs>

  <rect x="16" y="24" width="248" height="302" rx="20" ry="20" style="fill:#fafafa;stroke:#000000;stroke-width:1.6" />
  <text x="140" y="56" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{objective library}</text>
  <text x="140" y="80" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{known at estimation time}</text>

  <rect x="44" y="106" width="192" height="38" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.3" />
  <rect x="44" y="156" width="192" height="38" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.3" />
  <rect x="44" y="206" width="192" height="38" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.3" />
  <text x="140" y="131" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{$\ell_1^i$}</text>
  <text x="140" y="181" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{$\ell_2^i$}</text>
  <text x="140" y="231" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{$\ell_3^i$}</text>
  <text x="140" y="278" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{ordered later into}</text>
  <text x="140" y="300" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{candidate permutations}</text>

  <path d="M 264 175 L 306 175" style="fill:none;stroke:#000000;stroke-width:2;stroke-linecap:round;marker-end:url(#arrow)" />

  <rect x="324" y="24" width="780" height="302" rx="20" ry="20" style="fill:#fafafa;stroke:#000000;stroke-width:1.6" />
  <text x="714" y="56" text-anchor="middle" style="font-family:Sans;font-size:18px">\footnotesize{candidate orders}</text>
  <text x="714" y="80" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{$|\Pi^i| = 3! = 6$ for this example}</text>

  <rect x="354" y="108" width="220" height="50" rx="10" ry="10" style="fill:#e8f5e9;stroke:#2f7d32;stroke-width:1.7" />
  <rect x="604" y="108" width="220" height="50" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <rect x="854" y="108" width="220" height="50" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <rect x="354" y="182" width="220" height="50" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <rect x="604" y="182" width="220" height="50" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />
  <rect x="854" y="182" width="220" height="50" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2" />

  <text x="464" y="138" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{$\left[\ell_1,\ell_2,\ell_3\right]$}</text>
  <text x="714" y="138" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{$\left[\ell_1,\ell_3,\ell_2\right]$}</text>
  <text x="964" y="138" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{$\left[\ell_2,\ell_1,\ell_3\right]$}</text>
  <text x="464" y="212" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{$\left[\ell_2,\ell_3,\ell_1\right]$}</text>
  <text x="714" y="212" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{$\left[\ell_3,\ell_1,\ell_2\right]$}</text>
  <text x="964" y="212" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{$\left[\ell_3,\ell_2,\ell_1\right]$}</text>

  <rect x="350" y="252" width="724" height="50" rx="10" ry="10" style="fill:#ffffff;stroke:#000000;stroke-width:1.2;stroke-dasharray:5,4" />
  <text x="712" y="283" text-anchor="middle" style="font-family:Sans;font-size:16px">\footnotesize{the search is discrete, but the number of candidates grows factorially with the objective levels}</text>
</svg>
