  <text x="1375" y="399" text-anchor="middle" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">\textbf{watchdog}</text>
  <text x="1375" y="431" text-anchor="middle" fill="#0f172a" font-size="16" font-family="DejaVu Sans, Liberation Sans, sans-serif">timeout $\Rightarrow 0$</text>

  <rect x="940" y="498" width="352" height="110" rx="22" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="1116" y="533" text-anchor="middle" fill="#0f172a" font-size="22" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">\textbf{State estimate}</text>
