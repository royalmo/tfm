  <text x="432.5" y="435" text-anchor="middle" fill="#0f172a" font-size="16" font-family="DejaVu Sans, Liberation Sans, sans-serif">every $\Delta t$</text>

  <rect x="78" y="405" width="96" height="72" rx="18" fill="#ffedd5" stroke="#c46a1c" stroke-width="3"/>
