  <text x="1091" y="286" text-anchor="middle" fill="#0f172a" font-size="16" font-family="DejaVu Sans, Liberation Sans, sans-serif">$\mathbf{a}_k \mapsto u_k$</text>
  <text x="1091" y="312" text-anchor="middle" fill="#0f172a" font-size="16" font-family="DejaVu Sans, Liberation Sans, sans-serif">$u_k = (v_k,\omega_k)$</text>

