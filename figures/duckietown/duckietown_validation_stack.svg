<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1600" height="760" viewBox="0 0 1600 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2f855a"/>
    </marker>
  </defs>
  <text x="800" y="52" text-anchor="middle" fill="#0f172a" font-size="24" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">Validation stack for the Duckietown framework</text>
  <rect x="70" y="90" width="1460" height="115" rx="18" fill="#eff6ff" stroke="#475569" stroke-width="3"/>
  <text x="180" y="124" text-anchor="start" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">Unit tests</text>
  <text x="180" y="162" text-anchor="start" fill="#0f172a" font-size="14" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="normal">velocity decay, heading following, clamping, wrap\_to\_pi</text>
  <rect x="95" y="114" width="56" height="56" rx="28" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="123" y="150" text-anchor="middle" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">1</text>
  <rect x="70" y="245" width="1460" height="115" rx="18" fill="#f0fdf4" stroke="#475569" stroke-width="3"/>
  <text x="180" y="279" text-anchor="start" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">Local simulation</text>
  <text x="180" y="317" text-anchor="start" fill="#0f172a" font-size="14" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="normal">deterministic accel patterns, ROS-free validation</text>
  <rect x="95" y="269" width="56" height="56" rx="28" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="123" y="305" text-anchor="middle" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">2</text>
  <rect x="70" y="400" width="1460" height="115" rx="18" fill="#fffbeb" stroke="#475569" stroke-width="3"/>
  <text x="180" y="434" text-anchor="start" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">ROS smoke test</text>
  <text x="180" y="472" text-anchor="start" fill="#0f172a" font-size="14" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="normal">manager and adapter containers, /external\_control/state, /external\_control/accel\_cmd</text>
  <rect x="95" y="424" width="56" height="56" rx="28" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="123" y="460" text-anchor="middle" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">3</text>
  <rect x="70" y="555" width="1460" height="115" rx="18" fill="#fdf2f8" stroke="#475569" stroke-width="3"/>
  <text x="180" y="589" text-anchor="start" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">Real-robot deployment</text>
  <text x="180" y="627" text-anchor="start" fill="#0f172a" font-size="14" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="normal">one manager on the laptop, one adapter per robot, Julia TCP bridge</text>
  <rect x="95" y="579" width="56" height="56" rx="28" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="123" y="615" text-anchor="middle" fill="#0f172a" font-size="20" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="bold">4</text>
  <line x1="800.0" y1="205" x2="800.0" y2="245" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="800.0" y="233" text-anchor="middle" fill="#64748b" font-size="12" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="normal">increasing realism</text>
  <line x1="800.0" y1="360" x2="800.0" y2="400" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="800.0" y="388" text-anchor="middle" fill="#64748b" font-size="12" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="normal">increasing realism</text>
  <line x1="800.0" y1="515" x2="800.0" y2="555" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="800.0" y="543" text-anchor="middle" fill="#64748b" font-size="12" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="normal">increasing realism</text>
  <text x="800" y="708" text-anchor="middle" fill="#0f172a" font-size="14" font-family="DejaVu Sans, Liberation Sans, sans-serif" font-weight="normal">The same stack is exercised first in software, then in ROS containers, and finally on physical robots.</text>
</svg>
