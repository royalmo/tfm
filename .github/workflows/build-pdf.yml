name: Build Thesis PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile thesis
        uses: xu-cheng/latex-action@v3
        with:
          docker_image: ghcr.io/xu-cheng/texlive-full:latest
          root_file: thesis.tex
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Create timestamped filename
        id: meta
        run: |
          TS="$(date -u +'%Y%m%d-%H%M%S')"
          BASE="thesis-${TS}-${GITHUB_SHA}"
          OUT="${BASE}.pdf"
          mv thesis.pdf "${OUT}"
          echo "artifact_name=${BASE}" >> "${GITHUB_OUTPUT}"
          echo "output_file=${OUT}" >> "${GITHUB_OUTPUT}"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.output_file }}
          if-no-files-found: error
          retention-days: 30
